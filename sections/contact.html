<section id="contact" class="contact section resume-section-animated">
    <!-- Background Canvas for the whole section -->
    <canvas id="contact-canvas"></canvas>

    <style>
        #contact {
            background: radial-gradient(circle at center, #1a0b2e 0%, #02050a 100%) !important;
            position: relative;
        }

        /* Overlay for a more premium dark look */
        #contact::before {
            content: "";
            background: rgba(0, 0, 0, 0.2);
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        #contact-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        #contact .form-control {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
            border-radius: 12px !important;
            padding: 12px 15px !important;
            transition: all 0.3s ease !important;
            backdrop-filter: blur(5px);
        }

        #contact .form-control:focus {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: #7c3aed !important;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.2) !important;
            color: #fff !important;
            transform: translateY(-1px);
        }

        #contact .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4) !important;
        }

        #contact .submit-btn {
            background: #7c3aed;
            color: #fff;
            border: 0;
            padding: 12px 40px;
            transition: 0.4s;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
            position: relative;
            z-index: 2;
        }

        #contact .submit-btn:hover {
            background: #8b5cf6 !important;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4) !important;
            color: #fff;
        }

        #contact label {
            color: #fff;
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
        }

        #contact .php-email-form {
            background: transparent !important;
            box-shadow: none !important;
            padding: 0 !important;
        }
    </style>

    <!-- Section Title -->
    <div class="container section-title" style="position: relative; z-index: 2;">
        <h2>Contact Me</h2>
        <p>I'm always open to new opportunities and collaborations. Feel free to reach out!</p>
    </div><!-- End Section Title -->

    <div class="container" style="position: relative; z-index: 2;">

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="resume-glass-bubble">
                    <form id="discord-contact-form" class="php-email-form">
                        <div class="row gy-4">

                            <div class="col-md-6">
                                <label for="name-field">Name</label>
                                <input type="text" name="name" id="name-field" class="form-control"
                                    placeholder="Your Name" required="">
                            </div>

                            <div class="col-md-6">
                                <label for="email-field">Email</label>
                                <input type="email" class="form-control" name="email" id="email-field"
                                    placeholder="your@email.com" required="">
                            </div>

                            <div class="col-md-12">
                                <label for="contact-way-field">Additional Way Of Contact</label>
                                <input type="text" class="form-control" name="contact_way" id="contact-way-field"
                                    placeholder="Discord, LinkedIn, Phone, etc.">
                            </div>

                            <div class="col-md-12">
                                <label for="message-field">Message</label>
                                <textarea class="form-control" name="message" rows="6" id="message-field"
                                    placeholder="Tell me about your project..." required=""></textarea>
                            </div>

                            <div class="col-md-12 text-center">
                                <div id="form-loader" style="display: none; color: #7c3aed; margin-bottom: 15px;">
                                    <div class="spinner-border spinner-border-sm" role="status"></div> Sending...
                                </div>
                                <div id="form-error"
                                    style="display: none; color: #ff4d4d; margin-bottom: 15px; background: rgba(255, 77, 77, 0.1); padding: 10px; border-radius: 8px;">
                                </div>
                                <div id="form-success"
                                    style="display: none; color: #4ade80; margin-bottom: 15px; background: rgba(74, 222, 128, 0.1); padding: 10px; border-radius: 8px;">
                                    Your message has been sent. Thank you!</div>

                                <button type="submit" id="submit-btn" class="submit-btn">Send Message</button>
                            </div>

                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>

</section><!-- /Contact Section -->
